<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Camera Streaming</title>
    <style>
      body { font-family: monospace; background: #111; color: #eee; padding: 1rem; }
      h1 { margin-bottom: 0.5rem; }
      #fps { font-size: 1.2rem; color: #0f0; margin-bottom: 0.5rem; }
    </style>
  </head>
  <body>
    <h1>Camera snapshot</h1>
    <div id="fps">FPS: --</div>
    <img id="cam" width="640" />
 
    <script>
      let frameCount = 0;
      let lastTime = performance.now();
 
      function refresh() {
        const img = document.getElementById("cam");
        const newImg = new Image();
 
        newImg.onload = function() {
          img.src = newImg.src;
 
          frameCount++;
          const now = performance.now();
          const elapsed = now - lastTime;
          if (elapsed >= 1000) {
            document.getElementById("fps").textContent =
              "FPS: " + (frameCount / elapsed * 1000).toFixed(1);
            frameCount = 0;
            lastTime = now;
          }
 
          // Prochaine image seulement après que celle-ci est chargée
          setTimeout(refresh, 0);
        };
 
        newImg.onerror = function() {
          setTimeout(refresh, 200); // Réessaie après 200ms si erreur
        };
 
        // Cache-busting : timestamp dans l'URL
        newImg.src = "/latest.jpg?t=" + Date.now();
      }
 
      refresh();
    </script>
  </body>
</html>
